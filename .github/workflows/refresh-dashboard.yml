name: Refresh CSI Intake Dashboard

on:
  schedule:
    - cron: '0 8 * * *'   # 08:00 UTC daily = 03:00 AM CDT / 02:00 AM CST
  workflow_dispatch:        # allow manual trigger from Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download refresh script from GHE
        env:
          GHE_TOKEN: ${{ secrets.GHE_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import base64, json, urllib.request, os
          GHE_TOKEN = os.environ['GHE_TOKEN']
          url = 'https://git.soma.salesforce.com/api/v3/repos/ankur-sah/Cloud-Success-Insights/contents/SlackList_Dashboard_Setup/refresh_csi_slack_intake_dashboard.py?ref=master'
          req = urllib.request.Request(url, headers={'Authorization': f'token {GHE_TOKEN}', 'User-Agent': 'x'})
          with urllib.request.urlopen(req, timeout=30) as resp:
              data = json.loads(resp.read())
          code = base64.b64decode(data['content']).decode('utf-8')
          with open('refresh_csi.py', 'w') as f:
              f.write(code)
          print(f'Downloaded {len(code)//1024} KB')
          PYEOF

      - name: Run dashboard refresh
        env:
          SLACK_TOKEN:  ${{ secrets.SLACK_TOKEN }}
          SLACK_COOKIE: ${{ secrets.SLACK_COOKIE }}
          GHE_TOKEN:    ${{ secrets.GHE_TOKEN }}
        run: python3 refresh_csi.py

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Dashboard refresh failed. Slack credentials may be expired."
          echo "To fix: re-extract SLACK_TOKEN and SLACK_COOKIE from DevTools and update at:"
          echo "https://github.com/ankursah1401/CSG-Cloud-Success-Insights/settings/secrets/actions"
